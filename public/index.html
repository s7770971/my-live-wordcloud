<html>
<head>
    <meta charset="UTF-8">
    <title>唱什麼由你決定</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js"></script>
    <style>
        /* 💡 1. 載入更可愛、更圓潤的 M PLUS Rounded 1c 字體 */
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;800&family=Noto+Sans+TC:wght@700&display=swap');

        body { 
            margin: 0; 
            background-image: url('bg.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
            position: relative;
            background-color: #1a1a1a;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(20, 20, 20, 0.3); /* 保持 0.3 透明黑幕 */
            z-index: 1;
        }

        canvas { 
            width: 100vw; 
            height: 100vh; 
            position: relative;
            z-index: 2; 
            /* 💡 讓字體自帶微微的發光，看起來更像活潑的霓虹燈 */
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.5));
            transition: opacity 0.3s ease-in-out; 
            opacity: 1;
        }

        .refreshing { opacity: 0.4; }

        .qrcode-container {
            position: absolute;
            top: 20px; left: 50%; transform: translateX(-50%); 
            z-index: 999; background: white; padding: 12px; border-radius: 12px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            text-align: center;
        }
        .qrcode-container img { width: 140px; height: 140px; display: block; }
        .qrcode-text { color: #222; font-size: 14px; font-weight: bold; margin-top: 6px; }
    </style>
</head>
<body>

        <img src="qrcode.png" alt="掃描投票">
        <div class="qrcode-text">掃我加入歌詞投票</div>
    </div>
