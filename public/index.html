<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>唱什麼由你決定</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js"></script>
    <style>
        body { margin: 0; background-image: url('bg.jpg'); background-size: cover; background-position: center; height: 100vh; overflow: hidden; background-color: #1a1a1a; }
        canvas { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <canvas id="cloud-canvas"></canvas>
    <script>
        const socket = io();
        const canvas = document.getElementById('cloud-canvas');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        socket.on('update_cloud', (wordCounts) => {
            const list = Object.keys(wordCounts).map(word => [word, Math.max(wordCounts[word] * 15 + 20, 20)]);
            WordCloud(canvas, { 
                list: list, 
                fontFamily: '微軟正黑體, sans-serif',
                color: 'random-light', 
                backgroundColor: 'transparent',
                drawOutOfBound: true,
                gridSize: 5
            });
        });
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
