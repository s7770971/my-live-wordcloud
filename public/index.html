<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>唱什麼由你決定</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Noto+Sans+TC:wght@500;700&display=swap');

        body { 
            margin: 0; 
            background-image: url('bg.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
            position: relative;
            background-color: #1a1a1a;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(20, 20, 20, 0.5); 
            z-index: 1;
        }
        canvas { 
            width: 100vw; 
            height: 100vh; 
            position: relative;
            z-index: 2; 
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.6)) drop-shadow(0 0 15px rgba(0, 123, 255, 0.3));
            transition: opacity 0.3s ease-in-out, transform 0.3s ease-in-out; 
            opacity: 1;
        }
        .refreshing {
            opacity: 0.3; 
        }
    </style>
</head>
<body>
    <canvas id="cloud-canvas"></canvas>
    <script>
        // 💡 核心修改：強制大螢幕連回當前正確網址
        const socket = io(window.location.origin);
        const canvas = document.getElementById('cloud-canvas');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();

        let renderTimeout;

        socket.on('update_cloud', (wordCounts) => {
            clearTimeout(renderTimeout);
            canvas.classList.add('refreshing');

            renderTimeout = setTimeout(() => {
                const list = Object.keys(wordCounts).map(word => {
                    const count = wordCounts[word];
                    let baseSize = Math.sqrt(count) * 15 + 25; 
                    if (word.length > 2) {
                        baseSize = baseSize * (2.5 / word.length);
                    }
                    return [word, Math.max(baseSize, 18)];
                }); 
                
                WordCloud(canvas, { 
                    list: list, 
                    fontFamily: '"Kosugi Maru", "Noto Sans TC", "微軟正黑體", sans-serif', 
                    weightFactor: 1, 
                    color: 'random-light', 
                    backgroundColor: 'transparent', 
                    rotateRatio: 0,   
                    gridSize: 5,      
                    drawOutOfBound: true, 
                    wait: 10          
                });

                setTimeout(() => {
                    canvas.classList.remove('refreshing');
                }, 250);

            }, 300); 
        });

        window.addEventListener('resize', resizeCanvas);
    </script>
</body>
</html>
