<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>唱什麼由你決定</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;800&family=Noto+Sans+TC:wght@700&display=swap');

        body { 
            margin: 0; 
            background-image: url('bg.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
            position: relative;
            background-color: #1a1a1a;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(20, 20, 20, 0.4); 
            z-index: 1;
        }

        canvas { 
            width: 100vw; 
            height: 100vh; 
            position: relative;
            z-index: 2; 
            transition: opacity 0.3s ease-in-out; 
            opacity: 1;
        }

        .refreshing { opacity: 0.3; }

        .qrcode-container {
            position: absolute;
            top: 20px; left: 50%; transform: translateX(-50%); 
            z-index: 999; background: white; padding: 12px; border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        .qrcode-container img { width: 140px; height: 140px; display: block; }
        .qrcode-text { color: #222; font-size: 14px; font-weight: bold; margin-top: 6px; font-family: 'Noto Sans TC', sans-serif; }
    </style>
</head>
<body>

    <div class="qrcode-container">
        <img src="qrcode.png" alt="掃描投票">
        <div class="qrcode-text">掃我加入歌詞投票</div>
    </div>

    <canvas id="cloud-canvas"></canvas>
    
    <script>
        // 💡 終極不當機魔法：攔截 Canvas 底層的原生「填色」功能！
        const originalFillText = CanvasRenderingContext2D.prototype.fillText;
        CanvasRenderingContext2D.prototype.fillText = function(text, x, y, maxWidth) {
            // 只要偵測到套件準備畫置中的字體，我們立刻攔截！
            if (x === 0 && y === 0 && this.textBaseline === 'middle') {
                this.save();
                
                // 1. 取得當前字體大小與寬度
                const fontSizeMatch = this.font.match(/(\d+(?:\.\d+)?)px/);
                const fontSize = fontSizeMatch ? parseFloat(fontSizeMatch[1]) : 20;
                const textWidth = this.measureText(text).width;
                
                // 2. 計算白底色塊的範圍
                const padX = fontSize * 0.4;
                const padY = fontSize * 0.2;
                const rectW = textWidth + padX * 2;
                const rectH = fontSize + padY * 2;
                const rectX = -textWidth / 2 - padX;
                const rectY = -fontSize / 2 - padY * 0.9;
                const r = fontSize * 0.25; 
                
                // 3. 畫出純白微透色塊（使用最傳統、絕對不當機的畫法）
                this.fillStyle = 'rgba(255, 255, 255, 0.95)';
                this.shadowBlur = 6;
                this.shadowColor = 'rgba(0, 0, 0, 0.3)';
                
                this.beginPath();
                this.moveTo(rectX + r, rectY);
                this.lineTo(rectX + rectW - r, rectY);
                this.quadraticCurveTo(rectX + rectW, rectY, rectX + rectW, rectY + r);
                this.lineTo(rectX + rectW, rectY + rectH - r);
                this.quadraticCurveTo(rectX + rectW, rectY + rectH, rectX + rectW - r, rectY + rectH);
                this.lineTo(rectX + r, rectY + rectH);
                this.quadraticCurveTo(rectX, rectY + rectH, rectX, rectY + rectH - r);
                this.lineTo(rectX, rectY + r);
                this.quadraticCurveTo(rectX, rectY, rectX + r, rectY);
                this.closePath();
                this.fill();
                
                this.shadowBlur = 0; // 關閉陰影，確保字體乾淨
                
                // 4. 畫上純黑邊框
                this.lineWidth = Math.max(fontSize * 0.1, 2.5);
                this.strokeStyle = '#000000';
                this.lineJoin = 'round';
                this.strokeText(text, x, y);
                
                this.restore();
            }
            
            // 5. 放行！讓原本的畫筆把黑色的字體疊加在最上層！
            originalFillText.apply(this, arguments);
        };

        const socket = io(window.location.origin);
        const canvas = document.getElementById('cloud-canvas');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();

        let renderTimeout;

        socket.on('update_cloud', (wordCounts) => {
            clearTimeout(renderTimeout);
            canvas.classList.add('refreshing');

            renderTimeout = setTimeout(() => {
                const list = Object.keys(wordCounts).map(word => {
                    const count = wordCounts[word];
                    let baseSize = Math.sqrt(count) * 16 + 26; 
                    if (word.length > 1) {
                        baseSize = baseSize * (2.2 / word.length) + 6;
                    }
                    return [word, Math.max(baseSize, 20)]; 
                }); 
                
                const ctx = canvas.getContext('2d');

                WordCloud(canvas, { 
                    list: list, 
                    fontFamily: '"M PLUS Rounded 1c", "Noto Sans TC", "微軟正黑體", sans-serif', 
                    weightFactor: 1, 
                    
                    // 💡 黑色系色階
                    color: function() {
                        const blackShades = ['#000000', '#1c1917', '#292524', '#44403c', '#0c0a09'];
                        return blackShades[Math.floor(Math.random() * blackShades.length)];
                    },
                    
                    backgroundColor: 'transparent', 
                    rotateRatio: 0.25,   
                    minRotation: -0.2, 
                    maxRotation: 0.2,  
                    gridSize: 14, // 💡 給白底色塊預留了足夠的網格空間
                    drawOutOfBound: true, 
                    wait: 10
                    // 💡 徹底移除會當機的 onWordPlot，全靠上面攔截畫筆！
                });

                setTimeout(() => {
                    ctx.clearRect(0, 0, canvas.width, 210); // 確保 QR Code 區淨空
                    canvas.classList.remove('refreshing');
                }, 260);

            }, 300); 
        });

        window.addEventListener('resize', resizeCanvas);
    </script>
</body>
</html>
