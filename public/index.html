<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>唱什麼由你決定</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;800&family=Noto+Sans+TC:wght@700&display=swap');

        body { 
            margin: 0; 
            background-image: url('bg.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
            position: relative;
            background-color: #1a1a1a;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(20, 20, 20, 0.4); 
            z-index: 1;
        }

        canvas { 
            width: 100vw; 
            height: 100vh; 
            position: relative;
            z-index: 2; 
            transition: opacity 0.3s ease-in-out; 
            opacity: 1;
        }

        .refreshing { opacity: 0.3; }

        .qrcode-container {
            position: absolute;
            top: 20px; left: 50%; transform: translateX(-50%); 
            z-index: 999; background: white; padding: 12px; border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        .qrcode-container img { width: 140px; height: 140px; display: block; }
        .qrcode-text { color: #222; font-size: 14px; font-weight: bold; margin-top: 6px; font-family: 'Noto Sans TC', sans-serif; }
    </style>
</head>
<body>

    <div class="qrcode-container">
        <img src="qrcode.png" alt="掃描投票">
        <div class="qrcode-text">掃我加入歌詞投票</div>
    </div>

    <canvas id="cloud-canvas"></canvas>
    
    <script>
        const socket = io(window.location.origin);
        const canvas = document.getElementById('cloud-canvas');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();

        let renderTimeout;

        socket.on('update_cloud', (wordCounts) => {
            clearTimeout(renderTimeout);
            canvas.classList.add('refreshing');

            renderTimeout = setTimeout(() => {
                const list = Object.keys(wordCounts).map(word => {
                    const count = wordCounts[word];
                    let baseSize = Math.sqrt(count) * 16 + 26; 
                    if (word.length > 1) {
                        baseSize = baseSize * (2.2 / word.length) + 6;
                    }
                    return [word, Math.max(baseSize, 20)]; 
                }); 
                
                const ctx = canvas.getContext('2d');

                WordCloud(canvas, { 
                    list: list, 
                    fontFamily: '"M PLUS Rounded 1c", "Noto Sans TC", "微軟正黑體", sans-serif', 
                    weightFactor: 1, 
                    
                    color: 'random-light', 
                    backgroundColor: 'transparent', 
                    rotateRatio: 0.25,   
                    minRotation: -0.2, 
                    maxRotation: 0.2,  
                    gridSize: 12, 
                    drawOutOfBound: true, 
                    wait: 10,
                    
                    onWordPlot: function(item) {
                        const text = item[0];
                        const fontSize = item[1];
                        const x = item[2];
                        const y = item[3];
                        const rotateRad = item[4] || 0;

                        ctx.save();
                        ctx.translate(x, y);
                        ctx.rotate(rotateRad);

                        ctx.font = '700 ' + fontSize + 'px "M PLUS Rounded 1c", "Noto Sans TC", sans-serif';
                        const textWidth = ctx.measureText(text).width;

                        const padX = fontSize * 0.35;
                        const padY = fontSize * 0.2;
                        const rectW = textWidth + (padX * 2);
                        const rectH = fontSize + (padY * 2);
                        const rectX = -padX;
                        const rectY = -(fontSize * 0.8) - padY;

                        // ─── 1. 絕對不當機的手工圓角畫法 ───
                        const r = fontSize * 0.25; // 圓角半徑
                        ctx.beginPath();
                        ctx.moveTo(rectX + r, rectY);
                        ctx.lineTo(rectX + rectW - r, rectY);
                        ctx.quadraticCurveTo(rectX + rectW, rectY, rectX + rectW, rectY + r);
                        ctx.lineTo(rectX + rectW, rectY + rectH - r);
                        ctx.quadraticCurveTo(rectX + rectW, rectY + rectH, rectX + rectW - r, rectY + rectH);
                        ctx.lineTo(rectX + r, rectY + rectH);
                        ctx.quadraticCurveTo(rectX, rectY + rectH, rectX, rectY + rectH - r);
                        ctx.lineTo(rectX, rectY + r);
                        ctx.quadraticCurveTo(rectX, rectY, rectX + r, rectY);
                        ctx.closePath();

                        ctx.fillStyle = 'rgba(255, 255, 255, 0.9)'; 
                        ctx.shadowBlur = 6;
                        ctx.shadowColor = 'rgba(0, 0, 0, 0.25)'; 
                        ctx.fill();

                        ctx.shadowBlur = 0; 

                        // ─── 2. 畫上純黑框描邊 ───
                        ctx.lineWidth = Math.max(fontSize * 0.12, 3); 
                        ctx.strokeStyle = '#000000'; 
                        ctx.lineJoin = 'round';     
                        ctx.strokeText(text, 0, 0); 
                        
                        // ─── 3. 填上黑色階字體 ───
                        const blackShades = ['#000000', '#1c1917', '#292524', '#44403c', '#0c0a09'];
                        ctx.fillStyle = blackShades[Math.floor(Math.random() * blackShades.length)];
                        ctx.fillText(text, 0, 0);
                        
                        ctx.restore();
                    }
                });

                setTimeout(() => {
                    ctx.clearRect(0, 0, canvas.width, 210); 
                    canvas.classList.remove('refreshing');
                }, 260);

            }, 300); 
        });

        window.addEventListener('resize', resizeCanvas);
    </script>
</body>
</html>
