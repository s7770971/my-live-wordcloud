<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>唱什麼由你決定</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Noto+Sans+TC:wght@500;700&display=swap');

        body { 
            margin: 0; 
            background-image: url('bg.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
            position: relative;
            background-color: #1a1a1a;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(20, 20, 20, 0.3); /* 保持你最愛的 0.3 微透黑幕 */
            z-index: 1;
        }

        canvas { 
            width: 100vw; 
            height: 100vh; 
            position: relative;
            z-index: 2; 
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.6)) drop-shadow(0 0 15px rgba(0, 123, 255, 0.3));
            transition: opacity 0.3s ease-in-out; 
            opacity: 1;
        }

        .refreshing {
            opacity: 0.3; 
        }

        .qrcode-container {
            position: absolute;
            top: 20px;          
            left: 50%;          
            transform: translateX(-50%); 
            z-index: 999;       
            background: white;  
            padding: 12px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.8), 0 0 40px rgba(0, 123, 255, 0.4);
            text-align: center;
        }

        .qrcode-container img {
            width: 140px;       
            height: 140px;
            display: block;
        }

        .qrcode-text {
            color: #222;
            font-size: 14px;
            font-weight: bold;
            font-family: 'Noto Sans TC', sans-serif;
            margin-top: 6px;
        }
    </style>
</head>
<body>

    <div class="qrcode-container">
        <img src="qrcode.png" alt="掃描投票">
        <div class="qrcode-text">掃我加入歌詞投票</div>
    </div>

    <canvas id="cloud-canvas"></canvas>
    
    <script>
        const socket = io(window.location.origin);
        const canvas = document.getElementById('cloud-canvas');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();

        let renderTimeout;

        socket.on('update_cloud', (wordCounts) => {
            clearTimeout(renderTimeout);
            canvas.classList.add('refreshing');

            renderTimeout = setTimeout(() => {
                // 💡 撤除 filter！直接把所有拿到的詞（不論長短）通通放進來畫
                const list = Object.keys(wordCounts).map(word => {
                    const count = wordCounts[word];
                    
                    // 💡 黃金自適應公式：
                    // 1 個字的時候基本大小是 40px，高票字會變大。
                    // 歌名越長（字數越多），基本字體會等比例縮小，確保大螢幕畫布不會吐血拒畫。
                    let baseSize = Math.sqrt(count) * 15 + 25; 
                    if (word.length > 1) {
                        baseSize = baseSize * (2.2 / word.length) + 6;
                    }
                    return [word, Math.max(baseSize, 18)]; // 最低保障 18px 辨識度
                }); 
                
                WordCloud(canvas, { 
                    list: list, 
                    fontFamily: '"Kosugi Maru", "Noto Sans TC", "微軟正黑體", sans-serif', 
                    weightFactor: 1, 
                    color: 'random-light', 
                    backgroundColor: 'transparent', 
                    rotateRatio: 0,   // 長短詞混雜時，0度不旋轉能讓大螢幕空間利用率達到最高，畫面最整齊
                    gridSize: 6,      
                    drawOutOfBound: true, 
                    wait: 10          
                });

                const ctx = canvas.getContext('2d');
                setTimeout(() => {
                    // 雙重保險：每次渲染完，強制擦乾淨頂端 210px 高度的區域，絕對不擋住 QR Code
                    ctx.clearRect(0, 0, canvas.width, 210);
                    canvas.classList.remove('refreshing');
                }, 260);

            }, 300); 
        });

        window.addEventListener('resize', resizeCanvas);
    </script>
</body>
</html>
