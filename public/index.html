<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>唱什麼由你決定</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Noto+Sans+TC:wght@500;700&display=swap');

        body { 
            margin: 0; 
            background-image: url('bg.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
            position: relative;
            background-color: #1a1a1a;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(20, 20, 20, 0.75); 
            z-index: 1;
        }
        
        canvas { 
            width: 100vw; 
            height: 100vh; 
            position: relative;
            z-index: 2; 
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.6)) drop-shadow(0 0 15px rgba(0, 123, 255, 0.3));
            transition: opacity 0.3s ease-in-out, transform 0.3s ease-in-out; 
            opacity: 1;
            transform: scale(1);
        }
        
        .refreshing {
            opacity: 0.3; 
            transform: scale(0.99);
        }

        .bubble-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; 
            pointer-events: none;
        }
        @keyframes floatUp {
            0% { transform: translateY(105vh) scale(0.5); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }
        .bubble {
            position: absolute;
            background: linear-gradient(135deg, rgba(255,255,255,0.4), rgba(0,123,255,0.2));
            border-radius: 50%;
            animation: floatUp 12s infinite linear;
        }
    </style>
</head>
<body>
    <div class="bubble-bg">
        <div class="bubble" style="width: 40px; height: 40px; left: 15%; animation-duration: 14s; animation-delay: 0s;"></div>
        <div class="bubble" style="width: 25px; height: 25px; left: 45%; animation-duration: 18s; animation-delay: 3s;"></div>
        <div class="bubble" style="width: 50px; height: 50px; left: 70%; animation-duration: 16s; animation-delay: 1s;"></div>
        <div class="bubble" style="width: 30px; height: 30px; left: 85%; animation-duration: 12s; animation-delay: 5s;"></div>
    </div>

    <canvas id="cloud-canvas"></canvas>
    
    <script>
        const socket = io();
        const canvas = document.getElementById('cloud-canvas');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();

        let renderTimeout;

        socket.on('update_cloud', (wordCounts) => {
            clearTimeout(renderTimeout);
            canvas.classList.add('refreshing');

            renderTimeout = setTimeout(() => {
                // 💡 【核心修復邏輯】：根據字數長度，動態調整字體，避免畫布排擠長詞
                const list = Object.keys(wordCounts).map(word => {
                    const count = wordCounts[word];
                    // 基礎大小改為平滑增長
                    let baseSize = Math.sqrt(count) * 15 + 25; 
                    
                    // 如果字數很多（大於 2 個字），等比例稍微縮減大小，挪出畫布空間
                    if (word.length > 2) {
                        baseSize = baseSize * (2.5 / word.length);
                    }
                    return [word, Math.max(baseSize, 18)]; // 確保最小字體 18px
                }); 
                
                WordCloud(canvas, { 
                    list: list, 
                    fontFamily: '"Kosugi Maru", "Noto Sans TC", "微軟正黑體", sans-serif', 
                    weightFactor: 1, 
                    color: 'random-light', 
                    backgroundColor: 'transparent', 
                    rotateRatio: 0,   // 💡 修改：長歌名完全不旋轉，能騰出 3 倍以上的畫布空間防止卡死
                    gridSize: 5,      // 💡 修改：緊湊型網格，讓長詞靠得更近
                    drawOutOfBound: true, // 💡 關鍵修復：強迫繪製！就算超出邊界也絕對要畫出來，這樣前端就不會卡死
                    wait: 10          
                });

                setTimeout(() => {
                    canvas.classList.remove('refreshing');
                }, 250);

            }, 300); 
        });

        window.addEventListener('resize', resizeCanvas);
    </script>
</body>
</html>
