<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>唱什麼由你決定</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@800;900&family=Noto+Sans+TC:wght@900&display=swap');

        body { 
            margin: 0; 
            background-image: url('bg.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
            position: relative;
            background-color: #1a1a1a;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(20, 20, 20, 0.3); /* 保持 0.3 微透黑幕 */
            z-index: 1;
        }

        /* 💡 核心修改：將兩個畫布完全重疊，透過 z-index 物理分層 */
        .canvas-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            transition: opacity 0.3s ease-in-out;
        }
        #bg-canvas { z-index: 2; } /* 底層：專門用來畫漸層白底色塊 */
        #fg-canvas { z-index: 3; pointer-events: none; } /* 頂層：專門用來畫黑色字體，絕對不被覆蓋 */

        .refreshing { opacity: 0.3; }

        .qrcode-container {
            position: absolute;
            top: 20px; left: 50%; transform: translateX(-50%); 
            z-index: 999; background: white; padding: 12px; border-radius: 12px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            text-align: center;
        }
        .qrcode-container img { width: 140px; height: 140px; display: block; }
        .qrcode-text { color: #222; font-size: 14px; font-weight: bold; margin-top: 6px; font-family: 'Noto Sans TC', sans-serif; }
    </style>
</head>
<body>

    <div class="qrcode-container">
        <img src="qrcode.png" alt="掃描投票">
        <div class="qrcode-text">掃我加入歌詞投票</div>
    </div>

    <canvas id="bg-canvas" class="canvas-layer"></canvas>
    <canvas id="fg-canvas" class="canvas-layer"></canvas>
    
    <script>
        const socket = io(window.location.origin);
        const bgCanvas = document.getElementById('bg-canvas');
        const fgCanvas = document.getElementById('fg-canvas');
        
        function resizeCanvas() {
            bgCanvas.width = window.innerWidth; bgCanvas.height = window.innerHeight;
            fgCanvas.width = window.innerWidth; fgCanvas.height = window.innerHeight;
        }
        resizeCanvas();

        let renderTimeout;

        socket.on('update_cloud', (wordCounts) => {
            clearTimeout(renderTimeout);
            bgCanvas.classList.add('refreshing');
            fgCanvas.classList.add('refreshing');

            renderTimeout = setTimeout(() => {
                const list = Object.keys(wordCounts).map(word => {
                    const count = wordCounts[word];
                    let baseSize = Math.sqrt(count) * 16 + 26; 
                    if (word.length > 1) {
                        baseSize = baseSize * (2.2 / word.length) + 6;
                    }
                    return [word, Math.max(baseSize, 20)]; 
                }); 

                // 取得上下兩個圖層的獨立畫筆
                const bgCtx = bgCanvas.getContext('2d');
                const fgCtx = fgCanvas.getContext('2d');
                
                // 每次重繪前，把兩張畫布通通清空乾淨
                bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
                fgCtx.clearRect(0, 0, fgCanvas.width, fgCanvas.height);

                // 讓 WordCloud2 在底層畫布跑運算排版
                WordCloud(bgCanvas, { 
                    list: list, 
                    fontFamily: '"M PLUS Rounded 1c", "Noto Sans TC", "微軟正黑體", sans-serif', 
                    weightFactor: 1, 
                    
                    // 讓套件原生只去填入極淡透明度，這樣即使它最後蓋上彩色，也根本看不見！
                    color: 'rgba(0,0,0,0.01)', 
                    backgroundColor: 'transparent', 
                    rotateRatio: 0.25,   
                    minRotation: -0.2, 
                    maxRotation: 0.2,  
                    gridSize: 20,      // 加大間距給色塊呼吸
                    drawOutOfBound: true, 
                    wait: 10,
                    
                    // 💡 圖層大作戰：徹底拆解繪製權限
                    onWordPlot: function(item) {
                        const text = item[0];
                        const fontSize = item[1];
                        const x = item[2];
                        const y = item[3];
                        const rotateRad = item[4];

                        // ─── 🛠️ 步驟 1：在【底層畫布 (bgCtx)】上，畫出漸層白底色塊 ───
                        bgCtx.save();
                        bgCtx.translate(x, y);
                        bgCtx.rotate(rotateRad);
                        
                        bgCtx.font = '900 ' + fontSize + 'px "M PLUS Rounded 1c", "Noto Sans TC", sans-serif';
                        const textWidth = bgCtx.measureText(text).width;
                        
                        const padX = fontSize * 0.38;
                        const padY = fontSize * 0.2;
                        const rectW = textWidth + (padX * 2);
                        const rectH = fontSize + (padY * 2);
                        const rectX = -padX;
                        const rectY = -(fontSize * 0.8) - padY;
                        
                        bgCtx.beginPath();
                        bgCtx.roundRect(rectX, rectY, rectW, rectH, fontSize * 0.32);
                        
                        const gradient = bgCtx.createLinearGradient(rectX, rectY, rectX + rectW, rectY + rectH);
                        gradient.addColorStop(0, 'rgba(255, 255, 255, 0.98)'); // 飽滿的漸層白底塊
                        gradient.addColorStop(1, 'rgba(240, 240, 240, 0.92)');
                        bgCtx.fillStyle = gradient;
                        
                        bgCtx.shadowBlur = 10;
                        bgCtx.shadowColor = 'rgba(0, 0, 0, 0.3)'; // 讓白塊有立體陰影
                        bgCtx.fill();
                        bgCtx.restore();

                        // ─── 🛠️ 步驟 2：在【頂層畫布 (fgCtx)】上，精準疊加純黑框與黑色階字體 ───
                        // 因為這是另一個畫布，套件永遠不可能爬到這裡來蓋掉你的顏色！
                        fgCtx.save();
                        fgCtx.translate(x, y);
                        fgCtx.rotate(rotateRad);
                        fgCtx.font = '900 ' + fontSize + 'px "M PLUS Rounded 1c", "Noto Sans TC", sans-serif';
                        
                        // 先畫純黑邊框（黑框）
                        fgCtx.lineWidth = Math.max(fontSize * 0.12, 3.5); 
                        fgCtx.strokeStyle = '#000000'; 
                        fgCtx.lineJoin = 'round';     
                        fgCtx.strokeText(text, 0, 0); 
                        
                        // 再填入「黑色階系」顏色
                        const blackShades = ['#000000', '#1c1917', '#252525', '#111111'];
                        fgCtx.fillStyle = blackShades[Math.floor(Math.random() * blackShades.length)];
                        fgCtx.fillText(text, 0, 0);
                        
                        fgCtx.restore();
                    }
                });

                setTimeout(() => {
                    // 雙重保險清空頂端 QR Code 禁區
                    bgCtx.clearRect(0, 0, bgCanvas.width, 210);
                    fgCtx.clearRect(0, 0, fgCanvas.width, 210);
                    
                    bgCanvas.classList.remove('refreshing');
                    fgCanvas.classList.remove('refreshing');
                }, 260);

            }, 300); 
        });

        window.addEventListener('resize', resizeCanvas);
    </script>
</body>
</html>
