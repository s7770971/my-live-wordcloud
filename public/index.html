<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>唱什麼由你決定</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js"></script>
    <style>
        /* 1. 載入圓潤、厚實的最可愛字體 */
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@800;900&family=Noto+Sans+TC:wght@900&display=swap');

        body { 
            margin: 0; 
            background-image: url('bg.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
            position: relative;
            background-color: #1a1a1a;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(20, 20, 20, 0.3); /* 保持 0.3 開放感微透黑幕 */
            z-index: 1;
        }

        canvas { 
            width: 100vw; 
            height: 100vh; 
            position: relative;
            z-index: 2; 
            transition: opacity 0.3s ease-in-out; 
            opacity: 1;
        }

        .refreshing { opacity: 0.3; }

        .qrcode-container {
            position: absolute;
            top: 20px; left: 50%; transform: translateX(-50%); 
            z-index: 999; background: white; padding: 12px; border-radius: 12px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            text-align: center;
        }
        .qrcode-container img { width: 140px; height: 140px; display: block; }
        .qrcode-text { color: #222; font-size: 14px; font-weight: bold; margin-top: 6px; font-family: 'Noto Sans TC', sans-serif; }
    </style>
</head>
<body>

    <div class="qrcode-container">
        <img src="qrcode.png" alt="掃描投票">
        <div class="qrcode-text">掃我加入歌詞投票</div>
    </div>

    <canvas id="cloud-canvas"></canvas>
    
    <script>
        const socket = io(window.location.origin);
        const canvas = document.getElementById('cloud-canvas');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();

        let renderTimeout;

        socket.on('update_cloud', (wordCounts) => {
            clearTimeout(renderTimeout);
            canvas.classList.add('refreshing');

            renderTimeout = setTimeout(() => {
                const list = Object.keys(wordCounts).map(word => {
                    const count = wordCounts[word];
                    let baseSize = Math.sqrt(count) * 16 + 26; 
                    if (word.length > 1) {
                        baseSize = baseSize * (2.2 / word.length) + 6;
                    }
                    return [word, Math.max(baseSize, 20)]; 
                }); 

                const ctx = canvas.getContext('2d');

                WordCloud(canvas, { 
                    list: list, 
                    fontFamily: '"M PLUS Rounded 1c", "Noto Sans TC", "微軟正黑體", sans-serif', 
                    weightFactor: 1, 
                    
                    // 💡 1. 調整為「黑色色階」：讓字體呈現不同層次的潮流黑灰
                    color: function() {
                        const blackShades = ['#000000', '#1c1917', '#292524', '#0c0a09'];
                        return blackShades[Math.floor(Math.random() * blackShades.length)];
                    },
                    
                    backgroundColor: 'transparent', 
                    rotateRatio: 0.25,   
                    minRotation: -0.2, 
                    maxRotation: 0.2,  
                    gridSize: 12,      // 稍微拉大網格，留出空間給文字背後的漸層白色塊底圖
                    drawOutOfBound: true, 
                    wait: 10,
                    
                    // 💡 2. 核心大改版：當套件決定好文字位置後，立刻動態繪製「漸層白圓角色塊底圖」
                    onWordPlot: function(item) {
                        ctx.save();
                        
                        const text = item[0];
                        const fontSize = item[1];
                        const x = item[2];
                        const y = item[3];
                        
                        // 計算文字所需的寬度，並加上內邊距（Padding）
                        ctx.font = '900 ' + fontSize + 'px "M PLUS Rounded 1c", "Noto Sans TC", sans-serif';
                        const textWidth = ctx.measureText(text).width;
                        const padX = fontSize * 0.4;
                        const padY = fontSize * 0.2;
                        
                        // 定義色塊的矩形範圍
                        const rectW = textWidth + (padX * 2);
                        const rectH = fontSize + (padY * 2);
                        const rectX = x - padX;
                        const rectY = y - (fontSize * 0.8) - padY;
                        
                        // 開始繪製圓角矩形色塊
                        ctx.beginPath();
                        ctx.roundRect(rectX, rectY, rectW, rectH, fontSize * 0.25); // 依字體大小調整圓角弧度
                        
                        // 💡 創造高級的「漸層白」：由右上至左下，從微透白過渡到優雅半透白
                        const gradient = ctx.createLinearGradient(rectX, rectY, rectX + rectW, rectY + rectH);
                        gradient.addColorStop(0, 'rgba(255, 255, 255, 0.95)');
                        gradient.addColorStop(1, 'rgba(245, 245, 245, 0.75)');
                        
                        ctx.fillStyle = gradient;
                        
                        // 為色塊加上微弱的黑色立體陰影，讓貼紙感更真實
                        ctx.shadowBlur = 6;
                        ctx.shadowColor = 'rgba(0, 0, 0, 0.15)';
                        ctx.fill();
                        
                        ctx.restore(); // 畫完底層色塊，釋放畫筆狀態
                        
                        // 💡 3. 色塊畫完後，套件會把黑色系字體填上去，我們手動補上清晰的純黑框描邊
                        ctx.save();
                        ctx.lineWidth = Math.max(fontSize * 0.1, 2.5); 
                        ctx.strokeStyle = '#000000'; 
                        ctx.lineJoin = 'round';     
                        ctx.strokeText(text, x, y); 
                        ctx.restore();
                    }
                });

                setTimeout(() => {
                    ctx.clearRect(0, 0, canvas.width, 210); // 確保頂端 QR Code 區淨空
                    canvas.classList.remove('refreshing');
                }, 260);

            }, 300); 
        });

        window.addEventListener('resize', resizeCanvas);
    </script>
</body>
</html>
