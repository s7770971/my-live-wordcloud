<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>唱什麼由你決定</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@800;900&family=Noto+Sans+TC:wght@900&display=swap');

        body { 
            margin: 0; 
            background-image: url('bg.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
            position: relative;
            background-color: #1a1a1a;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(20, 20, 20, 0.3); /* 保持 0.3 微透黑幕 */
            z-index: 1;
        }

        canvas { 
            width: 100vw; 
            height: 100vh; 
            position: relative;
            z-index: 2; 
            transition: opacity 0.3s ease-in-out; 
            opacity: 1;
        }

        .refreshing { opacity: 0.3; }

        .qrcode-container {
            position: absolute;
            top: 20px; left: 50%; transform: translateX(-50%); 
            z-index: 999; background: white; padding: 12px; border-radius: 12px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            text-align: center;
        }
        .qrcode-container img { width: 140px; height: 140px; display: block; }
        .qrcode-text { color: #222; font-size: 14px; font-weight: bold; margin-top: 6px; font-family: 'Noto Sans TC', sans-serif; }
    </style>
</head>
<body>

    <div class="qrcode-container">
        <img src="qrcode.png" alt="掃描投票">
        <div class="qrcode-text">掃我加入歌詞投票</div>
    </div>

    <canvas id="cloud-canvas"></canvas>
    
    <script>
        const socket = io(window.location.origin);
        const canvas = document.getElementById('cloud-canvas');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();

        let renderTimeout;

        socket.on('update_cloud', (wordCounts) => {
            clearTimeout(renderTimeout);
            canvas.classList.add('refreshing');

            renderTimeout = setTimeout(() => {
                const list = Object.keys(wordCounts).map(word => {
                    const count = wordCounts[word];
                    let baseSize = Math.sqrt(count) * 16 + 26; 
                    if (word.length > 1) {
                        baseSize = baseSize * (2.2 / word.length) + 6;
                    }
                    return [word, Math.max(baseSize, 20)]; 
                }); 

                const ctx = canvas.getContext('2d');

                WordCloud(canvas, { 
                    list: list, 
                    fontFamily: '"M PLUS Rounded 1c", "Noto Sans TC", "微軟正黑體", sans-serif', 
                    weightFactor: 1, 
                    
                    // 💡 1. 修正：讓套件正常使用隨機藍綠色繪製（不可用透明），確保位置排版 100% 正確
                    color: 'random-light',
                    
                    backgroundColor: 'transparent', 
                    rotateRatio: 0.25,   
                    minRotation: -0.2, 
                    maxRotation: 0.2,  
                    gridSize: 18,      // 💡 加大網格間距，給漸層色塊留出空間，絕對不重疊擠爆
                    drawOutOfBound: true, 
                    wait: 10,
                    
                    // 💡 2. 原地覆蓋魔法：套件畫好字的瞬間，我們立刻在原地疊加畫上「色塊」與「新黑字」
                    onWordPlot: function(item) {
                        const text = item[0];
                        const fontSize = item[1];
                        const x = item[2];
                        const y = item[3];
                        const rotateRad = item[4]; // 取得文字傾斜角度

                        ctx.save();
                        
                        // 1. 移動並旋轉畫筆，完全對齊套件的角度
                        ctx.translate(x, y);
                        ctx.rotate(rotateRad);
                        
                        // 2. 設定與套件一模一樣的字體尺寸，精準計算寬度
                        ctx.font = '900 ' + fontSize + 'px "M PLUS Rounded 1c", "Noto Sans TC", sans-serif';
                        const textWidth = ctx.measureText(text).width;
                        
                        // 3. 計算貼紙底色塊的邊距
                        const padX = fontSize * 0.35;
                        const padY = fontSize * 0.18;
                        const rectW = textWidth + (padX * 2);
                        const rectH = fontSize + (padY * 2);
                        const rectX = -padX;
                        const rectY = -(fontSize * 0.8) - padY;
                        
                        // ─── ✨ 核心步驟 A：原地強行覆蓋「圓角漸層白底」 ✨ ───
                        ctx.beginPath();
                        ctx.roundRect(rectX, rectY, rectW, rectH, fontSize * 0.3);
                        
                        const gradient = ctx.createLinearGradient(rectX, rectY, rectX + rectW, rectY + rectH);
                        gradient.addColorStop(0, 'rgba(255, 255, 255, 0.98)'); 
                        gradient.addColorStop(1, 'rgba(242, 242, 242, 0.90)');
                        
                        ctx.fillStyle = gradient;
                        ctx.shadowBlur = 8;
                        ctx.shadowColor = 'rgba(0, 0, 0, 0.25)'; // 貼紙立體陰影
                        ctx.fill();
                        
                        ctx.shadowBlur = 0; // 清除色塊陰影

                        // ─── ✨ 核心步驟 B：原地強行覆蓋「粗黑描邊邊框」 ✨ ───
                        ctx.lineWidth = Math.max(fontSize * 0.12, 3.5); 
                        ctx.strokeStyle = '#000000'; // 堅固純黑框
                        ctx.lineJoin = 'round';     
                        ctx.strokeText(text, 0, 0); 
                        
                        // ─── ✨ 核心步驟 C：原地強行覆蓋「黑色階字體」 ✨ ───
                        const blackShades = ['#000000', '#1c1917', '#292524', '#0c0a09'];
                        ctx.fillStyle = blackShades[Math.floor(Math.random() * blackShades.length)];
                        ctx.fillText(text, 0, 0);
                        
                        ctx.restore(); 
                    }
                });

                setTimeout(() => {
                    ctx.clearRect(0, 0, canvas.width, 210); // 確保頂端 QR Code 區淨空
                    canvas.classList.remove('refreshing');
                }, 260);

            }, 300); 
        });

        window.addEventListener('resize', resizeCanvas);
    </script>
</body>
</html>
