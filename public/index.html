<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>唱什麼由你決定</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js"></script>
    <style>
        /* 1. 載入更可愛、圓潤的 M PLUS Rounded 1c 字體 */
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;800&family=Noto+Sans+TC:wght@700&display=swap');

        body { 
            margin: 0; 
            background-image: url('bg.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
            position: relative;
            background-color: #1a1a1a;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(20, 20, 20, 0.4); /* 背景稍微壓暗，讓白色遮罩更跳 */
            z-index: 1;
        }

        /* 💡 核心修改：將 Canvas 直接變成圓角長方形白色遮罩 */
        canvas { 
            position: absolute;
            top: 220px; /* 完美避開上方的 QR Code 區域 */
            left: 5vw;
            width: 90vw; /* 留出左右兩邊的邊距 */
            height: calc(100vh - 250px); /* 留出下方的邊距 */
            
            background-color: rgba(255, 255, 255, 0.85); /* 長方形高透白底遮罩 */
            border-radius: 24px; /* 柔和的圓角設計 */
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4); /* 讓白板立體浮現 */
            
            z-index: 2; 
            transition: opacity 0.3s ease-in-out; 
            opacity: 1;
        }

        .refreshing { opacity: 0.3; }

        .qrcode-container {
            position: absolute;
            top: 20px; left: 50%; transform: translateX(-50%); 
            z-index: 999; background: white; padding: 12px; border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        .qrcode-container img { width: 140px; height: 140px; display: block; }
        .qrcode-text { color: #222; font-size: 14px; font-weight: bold; margin-top: 6px; font-family: 'Noto Sans TC', sans-serif; }
    </style>
</head>
<body>

    <div class="qrcode-container">
        <img src="qrcode.png" alt="掃描投票">
        <div class="qrcode-text">掃我加入歌詞投票</div>
    </div>

    <canvas id="cloud-canvas"></canvas>
    
    <script>
        const socket = io(window.location.origin);
        const canvas = document.getElementById('cloud-canvas');
        
        function resizeCanvas() {
            // 💡 確保畫布的內部解析度跟 CSS 的白板尺寸完美吻合，字體才不會變形
            canvas.width = window.innerWidth * 0.9;
            canvas.height = window.innerHeight - 250;
        }
        resizeCanvas();

        let renderTimeout;

        socket.on('update_cloud', (wordCounts) => {
            clearTimeout(renderTimeout);
            canvas.classList.add('refreshing');

            renderTimeout = setTimeout(() => {
                const list = Object.keys(wordCounts).map(word => {
                    const count = wordCounts[word];
                    let baseSize = Math.sqrt(count) * 16 + 26; 
                    if (word.length > 1) {
                        baseSize = baseSize * (2.2 / word.length) + 6;
                    }
                    return [word, Math.max(baseSize, 20)]; 
                }); 
                
                const ctx = canvas.getContext('2d');

                WordCloud(canvas, { 
                    list: list, 
                    fontFamily: '"M PLUS Rounded 1c", "Noto Sans TC", "微軟正黑體", sans-serif', 
                    weightFactor: 1, 
                    
                    // 保持你指定的黑色系色階
                    color: function() {
                        const blackShades = [
                            '#000000', // 純黑
                            '#1c1917', // 深炭灰
                            '#292524', // 石墨灰
                            '#44403c', // 焦灰
                            '#0c0a09'  // 極光黑
                        ];
                        return blackShades[Math.floor(Math.random() * blackShades.length)];
                    },
                    
                    backgroundColor: 'transparent', // 讓 CSS 的白板透上來
                    rotateRatio: 0.25,   
                    minRotation: -0.2, 
                    maxRotation: 0.2,  
                    gridSize: 8,      
                    drawOutOfBound: false, // 💡 嚴格限制字體不准超出白色遮罩邊緣
                    wait: 10,
                    
                    onWordPlot: function(item) {
                        ctx.save();
                        
                        // 純黑框描邊
                        ctx.lineWidth = Math.max(item[1] * 0.12, 3); 
                        ctx.strokeStyle = '#000000'; 
                        ctx.lineJoin = 'round';     
                        ctx.strokeText(item[0], item[2], item[3]); 
                        
                        // 💡 既然底板是白色，外發光我們改為「極淡的黑色陰影」，讓字體從白板上立體浮現！
                        ctx.shadowBlur = 4;
                        ctx.shadowColor = 'rgba(0, 0, 0, 0.15)';
                        
                        ctx.restore();
                    }
                });

                // 因為區域已經完美隔開，不再需要清除頂端，直接解除 loading 狀態
                setTimeout(() => {
                    canvas.classList.remove('refreshing');
                }, 260);

            }, 300); 
        });

        window.addEventListener('resize', resizeCanvas);
    </script>
</body>
</html>
