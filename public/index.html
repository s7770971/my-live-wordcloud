<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>唱什麼由你決定</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js"></script>
    <style>
        /* 載入最可愛、圓潤的 M PLUS Rounded 1c 字體 */
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@800;900&family=Noto+Sans+TC:wght@900&display=swap');

        body { 
            margin: 0; 
            background-image: url('bg.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
            position: relative;
            background-color: #1a1a1a;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(20, 20, 20, 0.4); /* 微透黑幕 */
            z-index: 1;
        }

        .qrcode-container {
            position: absolute;
            top: 20px; left: 50%; transform: translateX(-50%); 
            z-index: 999; background: white; padding: 12px; border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        .qrcode-container img { width: 140px; height: 140px; display: block; }
        .qrcode-text { color: #222; font-size: 14px; font-weight: bold; margin-top: 6px; font-family: 'Noto Sans TC', sans-serif; }

        /* 💡 1. 拋棄 Canvas！改用 Div 容器，完美避開 QR Code 區域 */
        #cloud-div {
            position: absolute;
            top: 220px; /* 讓文字雲從 QR Code 下方才開始出現，絕對不重疊！ */
            left: 0;
            width: 100vw; 
            height: calc(100vh - 220px);
            z-index: 2; 
            transition: opacity 0.3s ease-in-out;
        }

        .refreshing { opacity: 0.3; }

        /* 💡 2. 這是最核心的「貼紙樣式」！用純 CSS 畫色塊，穩定率 100% */
        .cloud-sticker {
            background-color: rgba(255, 255, 255, 0.95); /* 漂亮的白底色塊 */
            border: 3px solid #000000; /* 純黑邊框 */
            border-radius: 16px; /* 圓角 */
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.4); /* 微白發光，讓貼紙浮出來 */
            white-space: pre; /* 保留字體兩側的空白，把色塊撐開 */
            line-height: 1.1; /* 讓文字在色塊內完美置中 */
        }
    </style>
</head>
<body>

    <div class="qrcode-container">
        <img src="qrcode.png" alt="掃描投票">
        <div class="qrcode-text">掃我加入歌詞投票</div>
    </div>

    <div id="cloud-div"></div>
    
    <script>
        const socket = io(window.location.origin);
        const cloudDiv = document.getElementById('cloud-div');

        let renderTimeout;

        socket.on('update_cloud', (wordCounts) => {
            clearTimeout(renderTimeout);
            cloudDiv.classList.add('refreshing');

            renderTimeout = setTimeout(() => {
                // 每次收到新字，先把舊的貼紙全部清空
                cloudDiv.innerHTML = ''; 

                const list = Object.keys(wordCounts).map(word => {
                    const count = wordCounts[word];
                    let baseSize = Math.sqrt(count) * 16 + 26; 
                    if (word.length > 1) {
                        baseSize = baseSize * (2.2 / word.length) + 6;
                    }
                    // 💡 刻意在字的左右加空格，用來完美撐開背景的白色塊！
                    return [' ' + word + ' ', Math.max(baseSize, 20)]; 
                }); 

                WordCloud(cloudDiv, { 
                    list: list, 
                    fontFamily: '"M PLUS Rounded 1c", "Noto Sans TC", "微軟正黑體", sans-serif', 
                    weightFactor: 1, 
                    
                    // 讓字體套用你的黑色系色階
                    color: function() {
                        const blackShades = ['#000000', '#1c1917', '#292524', '#44403c', '#0c0a09'];
                        return blackShades[Math.floor(Math.random() * blackShades.length)];
                    },
                    
                    // 💡 把上面寫好的 CSS 貼紙樣式，套用到每一個字上！
                    classes: 'cloud-sticker', 
                    
                    backgroundColor: 'transparent', 
                    rotateRatio: 0.25,   
                    minRotation: -0.2, 
                    maxRotation: 0.2,  
                    gridSize: 15,      // 留出足夠的網格空間給貼紙
                    drawOutOfBound: false, 
                    wait: 10
                });

                setTimeout(() => {
                    cloudDiv.classList.remove('refreshing');
                }, 260);

            }, 300); 
        });
    </script>
</body>
</html>
