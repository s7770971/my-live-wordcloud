<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>唱什麼由你決定</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js"></script>
    <style>
        /* 💡 1. 載入更可愛、圓潤的 M PLUS Rounded 1c 字體 */
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;800&family=Noto+Sans+TC:wght@700&display=swap');

        body { 
            margin: 0; 
            background-image: url('bg.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
            position: relative;
            background-color: #1a1a1a;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(20, 20, 20, 0.3); /* 保持 0.3 透明黑幕 */
            z-index: 1;
        }

        canvas { 
            width: 100vw; 
            height: 100vh; 
            position: relative;
            z-index: 2; 
            /* 💡 讓字體自帶微霓虹發光 */
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.6)) drop-shadow(0 0 15px rgba(0, 123, 255, 0.3));
            transition: opacity 0.3s ease-in-out; 
            opacity: 1;
        }

        .refreshing { opacity: 0.3; }

        .qrcode-container {
            position: absolute;
            top: 20px; left: 50%; transform: translateX(-50%); 
            z-index: 999; background: white; padding: 12px; border-radius: 12px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            text-align: center;
        }
        .qrcode-container img { width: 140px; height: 140px; display: block; }
        .qrcode-text { color: #222; font-size: 14px; font-weight: bold; margin-top: 6px; font-family: 'Noto Sans TC', sans-serif; }
    </style>
</head>
<body>

    <div class="qrcode-container">
        <img src="qrcode.png" alt="掃描投票">
        <div class="qrcode-text">掃我加入歌詞投票</div>
    </div>

    <canvas id="cloud-canvas"></canvas>
    
    <script>
        const socket = io(window.location.origin);
        const canvas = document.getElementById('cloud-canvas');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();

        let renderTimeout;

        socket.on('update_cloud', (wordCounts) => {
            clearTimeout(renderTimeout);
            canvas.classList.add('refreshing');

            renderTimeout = setTimeout(() => {
                const list = Object.keys(wordCounts).map(word => {
                    const count = wordCounts[word];
                    // 💡 優化字體基礎大小，長短詞都有最完美的伸展體積
                    let baseSize = Math.sqrt(count) * 16 + 26; 
                    if (word.length > 1) {
                        baseSize = baseSize * (2.2 / word.length) + 6;
                    }
                    return [word, Math.max(baseSize, 18)];
                }); 
                
                WordCloud(canvas, { 
                    list: list, 
                    /* 💡 啟用超可愛胖胖圓體字 */
                    fontFamily: '"M PLUS Rounded 1c", "Noto Sans TC", "微軟正黑體", sans-serif', 
                    weightFactor: 1, 
                    color: 'random-light', 
                    backgroundColor: 'transparent', 
                    
                    /* 💡 【安全歪歪感修正】： */
                    /* 設定 0.25 的機率（約四分之一的字）會產生傾斜，傾斜角度為固定安全的微幅歪斜，絕對不當機！ */
                    rotateRatio: 0.25,   
                    minRotation: -0.2, // 微幅左歪
                    maxRotation: 0.2,  // 微幅右歪
                    
                    gridSize: 6,      
                    drawOutOfBound: true, 
                    wait: 10          
                });

                const ctx = canvas.getContext('2d');
                setTimeout(() => {
                    ctx.clearRect(0, 0, canvas.width, 210); // 確保 QR Code 區淨空
                    canvas.classList.remove('refreshing');
                }, 260);

            }, 300); 
        });

        window.addEventListener('resize', resizeCanvas);
    </script>
</body>
</html>
