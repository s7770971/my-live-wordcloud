<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>輸入字詞</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px 20px; background-color: #f0f0f0; }
        input { font-size: 24px; padding: 10px; width: 80%; border-radius: 8px; border: 1px solid #ccc; margin-bottom: 20px;}
        button { font-size: 24px; padding: 10px 40px; background-color: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer;}
    </style>
</head>
<body>
    <h2>請輸入你想說的詞！</h2>
    <input type="text" id="wordInput" placeholder="輸入文字..." maxlength="10">
    <br><button onclick="sendWord()">送出</button>
    <script>
        const socket = io();
        const input = document.getElementById('wordInput');
        function sendWord() {
            if (input.value.trim() !== '') {
                socket.emit('send_word', input.value);
                input.value = ''; 
            }
        }
    </script>
</body>
</html>
