<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>歌詞投票輸入</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { 
            font-family: '微軟正黑體', sans-serif; 
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center; height: 100vh;
            background-image: url('bg_mobile.jpg');
            background-size: cover; background-position: center;
        }
        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            padding: 40px 20px; border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            width: 85%; max-width: 320px; text-align: center;
        }
        h2 { color: #222; margin-top: 0; margin-bottom: 25px; font-size: 22px; letter-spacing: 1px; line-height: 1.4; }
        input { 
            font-size: 18px; padding: 14px; width: 100%; border-radius: 8px; 
            border: 1px solid #ddd; margin-bottom: 20px; outline: none; box-sizing: border-box;
            text-align: center;
        }
        button { 
            font-size: 18px; padding: 14px; background: linear-gradient(135deg, #007bff, #0056b3);
            color: white; border: none; border-radius: 8px; cursor: pointer; width: 100%; 
            box-sizing: border-box; font-weight: bold; box-shadow: 0 4px 15px rgba(0,123,255,0.3);
        }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="card">
        <h2>✨ 唱什麼由你決定 ✨<br>請輸入一格字詞關鍵字</h2>
        <input type="text" id="wordInput" placeholder="在此輸入">
        <button onclick="sendWord()">送出</button>
    </div>

    <script>
        // 💡 核心修改：不給特定網址，讓 io() 自動去抓當前連線，這在 Zeabur 環境下最安全穩定
        const socket = io(); 
        const input = document.getElementById('wordInput');

        function sendWord() {
            const word = input.value.trim();
            if (word !== '') {
                // 💡 安全檢查：如果還在連接中，給予提示而不是直接死掉
                if (!socket.connected) {
                    alert("⚠️ 系統正在嘗試與伺服器連線，請稍候 1-2 秒再試一次！");
                    return;
                }
                
                socket.emit('send_word', word);
                input.value = ''; 
                input.focus(); 
            }
        }

        input.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                sendWord();
            }
        });
    </script>
</body>
</html>
